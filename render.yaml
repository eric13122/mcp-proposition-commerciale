services:
  - type: web
    name: proposition-commerciale-mcp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: MCP_TRANSPORT
        value: sse
      - key: MCP_HOST
        value: 0.0.0.0
      - key: MCP_PORT
        value: 8000
      - key: PROPOSITION_WORK_DIR
        value: /tmp/proposition-sessions
    plan: starter
